<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="wnd_title"></title>
  <style type="text/css">
  	body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
.container {
  /*max-width: 800px;*/
  margin: 20px auto;
  padding: 20px;
  background-color: #fff;
  border-radius: 5px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}
h1 {
  text-align: center;
  color: #333;
}
.btn {
  display: inline-block;
  padding: 10px 20px;
  background-color: #0056b3;
  color: #fff;
  text-decoration: none;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}
.btn:hover {
  background-color: #007bff;
}
.btn-stop {
  background-color: #b1b1b1; /*#5a6268;*/
}
.btn-stop:hover {
  background-color: #b1b1b1; /*#5a6268;/*#678cac; /*6c757d;*/
}
.btn-secondary {
  background-color: #288121; /*#5a6268;*/
}
.btn-secondary:hover {
  background-color: #40ba37; /*#339b2b;*/ /*#6c757d;*/
}
.btn-gris {
  background-color: #5a6268;
}
.btn-gris:hover {
  background-color: #828e99; /*#6c757d;*/
}
.btn-danger {
  background-color: #b73636;
}
.btn-danger:hover {
  background-color: #e74747;
}
.btn-log {
  background-color: #7135a2;
}
.btn-log:hover {
  background-color: #9344d5;
}

.btn-add {
  background-color: #bf5414;
}
.btn-add:hover {
  background-color: #ff6e16;
}

.btn-iW11 {
  background-color: #0978c1;
}
.btn-iW11:hover {
  background-color: #0d9eff;
}


table {
  border-collapse: collapse;
  width: 100%;
}
th, td {
  border: 1px solid #dddddd;
  padding: 8px;
  text-align: left;
}
th {
  background-color: #f2f2f2;
}
/* Estilo básico para las cajas de texto */
.textbox {
  width: 200px; /* Ancho de la caja de texto */
  padding: 8px; /* Espaciado interno */
  border: 1px solid #ccc; /* Borde */
  border-radius: 5px; /* Bordes redondeados */
  font-size: 16px; /* Tamaño de la fuente */
}

/* Estilo cuando la caja de texto tiene el foco */
.textbox:focus {
  outline: none; /* Eliminar el borde alrededor de la caja de texto */
  border-color: #007bff; /* Cambiar el color del borde cuando está enfocado */
  box-shadow: 0 0 5px rgba(0, 123, 255, 0.5); /* Sombra alrededor de la caja de texto */
}

/* Estilo para cajas de texto con errores */
.textbox.error {
  border-color: #dc3545; /* Color del borde en caso de error */
}

/* Estilos para el contenedor del diálogo */
.dialog-container {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: #fff;
  border: 1px solid #ccc;
  border-radius: 5px;
  padding: 20px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  z-index: 1000;
}

/* Estilos para el título del diálogo */
.dialog-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

/* Estilos para el contenido del diálogo */
.dialog-content {
  margin-bottom: 20px;
}

/* Estilos para los botones del diálogo */
.dialog-buttons {
  text-align: center;
}

.dialog-buttons button {
  padding: 8px 16px;
  margin-right: 10px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
}

.dialog-buttons button.primary {
  background-color: #007bff;
  color: #fff;
}

.dialog-buttons button.secondary {
  background-color: #ccc;
  color: #333;
}
  /* Estilos para el fondo semitransparente */
.overlay {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-color: rgba(0, 0, 0, 0.5); /* Color de fondo semitransparente */
z-index: 999; /* Coloca el fondo por encima de otros elementos */
}
td {
  border-top-color: #FFF;
  border-left-color: #FFF;
  border-right-color: #FFF;
}

  </style>

	<script type="text/javascript">
    let deviceUSB = [];		// Función para abrir el diálogo
    let sock_tpm = "/tmp/swtpm-sock";
    let sock_w11Install = "";
    let fVirtIO = "drivers/virtio-win.iso";
    let carpeta_compartida = [];

		function openDialog(id) {
		  document.getElementById(id).style.display = 'block';
		  document.getElementById('overlay').style.display = 'block';
		}

		// Función para cerrar el diálogo
		function closeDialog(id) {
		  document.getElementById(id).style.display = 'none';
		  if(document.querySelectorAll(".dialog-container[style='display: block;']").length == 0)
		  		document.getElementById('overlay').style.display = 'none';		
		}

    function load(){
      let setlsusb = window.electronAPI.checklsusb();
      let setqemu = window.electronAPI.checkqemu();

      //let setsocat = window.electronAPI.checksocat();

      document.getElementById('dlg_title').innerHTML = "MaveriQ v" + window.electronAPI.getVersion();
      document.getElementById('wnd_title').innerHTML = "MaveriQ v" + window.electronAPI.getVersion();
      document.getElementById('dlg_pass_title').innerHTML = "MaveriQ v" + window.electronAPI.getVersion();
      document.getElementById('id_usr').innerHTML = window.electronAPI.getUser();

      openDialog("dialog-pass");
      document.getElementById('txt_pws').focus();

      if(!setlsusb){
        document.getElementById('dialog-alert-mensaje').innerHTML = "Se requiere <b>lsusb</b>.";
        openDialog("dialog-alert");
        document.getElementById('dialog-alert-btnOk').innerHTML = "Cerrar";
	    }else{
        if(!setqemu){
          document.getElementById('dialog-alert-mensaje').innerHTML = "Se requiere <b>qemu-system-x86_64</b>.";
          openDialog("dialog-alert");
          document.getElementById('dialog-alert-btnOk').innerHTML = "Cerrar";
        }else{    
          deviceUSB = window.electronAPI.lsusb();
          let quemuOS = window.electronAPI.getOS();
          
          document.getElementById("SisOpe").innerHTML = "<option value='-1'>Sistema Operativo</option>";
          //document.getElementById("SisDevOpe").innerHTML = "<option value='null'>Conectar a:</option>";
          for (var x = 0; x < quemuOS.length; x++) {
            if(quemuOS[x].type == "installed")
                document.getElementById("SisOpe").innerHTML += "<option value='"+x+"'>"+quemuOS[x].os+"</option>";
            else{
                document.getElementById("btn_"+quemuOS[x].type).title = quemuOS[x].os;
                document.getElementById('dlg_'+quemuOS[x].type+'_title').innerHTML = quemuOS[x].os;
            }
               
            //document.getElementById("SisDevOpe").innerHTML += "<option value='"+quemuOS[x].socket+"'>"+quemuOS[x].os+"</option>";
          } 

          document.getElementById("dev_usb").innerHTML = "<option value='-1'>Seleccione dispositivo</option>";
          for (var u = 0; u < deviceUSB.length; u++) {
            document.getElementById("dev_usb").innerHTML += "<option value='"+u+"'>"+deviceUSB[u].desc+"</option>";
          }
        }
      }
      updateBtniW11("start");
      window.electronAPI.createVirtIO(fVirtIO);
    }

    function uptUSBDev(){
      deviceUSB = window.electronAPI.lsusb();
      document.getElementById("dev_usb").innerHTML = "<option value='-1'>Seleccione dispositivo</option>";
      for (var u = 0; u < deviceUSB.length; u++) {
        document.getElementById("dev_usb").innerHTML += "<option value='"+u+"'>"+deviceUSB[u].desc+"</option>";
      }

      document.getElementById('dialog-alert-mensaje').innerHTML = "Listado USB Actualizado"; 
      openDialog('dialog-alert');  
      log("Listado USB Actualizado");
    }

    function loadInf(){
      if(document.getElementById("SisOpe").value == -1){
        document.getElementById("mCore").value = "";
        document.getElementById("nCore").value = "";
        document.getElementById("nRam").value = "";
        //document.getElementById("SisDevOpe").value = "null";
        document.getElementById("ejecutarSO").disabled = false;
        document.getElementById("ejecutarSO").classList.remove("btn-stop");
        document.getElementById("ejecutarSO").title="Lanzar Sistema Operativo";
      }else{
        let qOS = window.electronAPI.getOS()[document.getElementById("SisOpe").value];
        document.getElementById("mCore").value = qOS.mcore;
        document.getElementById("nCore").value = qOS.ncore;
        document.getElementById("nRam").value = qOS.ram;
        //document.getElementById("SisDevOpe").value = qOS.socket;

        if(window.electronAPI.validaPlayOS(qOS.socket)){
          document.getElementById("ejecutarSO").disabled = true;
          document.getElementById("ejecutarSO").classList.add("btn-stop");
          document.getElementById("ejecutarSO").title="Sistema Operativo en Ejecuciòn";
        }else{
          document.getElementById("ejecutarSO").disabled = false;
          document.getElementById("ejecutarSO").classList.remove("btn-stop");
          document.getElementById("ejecutarSO").title="Lanzar Sistema Operativo";
        }
      }
    }

    function validarUsr(){
      if(document.getElementById('dialog-alert').style.display == 'block'){
        closeDialog('dialog-alert');
      }else{
        const usr = document.getElementById('id_usr').innerHTML;
        document.getElementById('dialog-pass-btnOk').innerHTML = "Validando...";
        
        setTimeout(()=>{if(window.electronAPI.validaPswd(usr,document.getElementById('txt_pws').value)){
          closeDialog('dialog-pass');
          document.getElementById('dialog-pass-btnOk').innerHTML = "Aceptar";
        }else{
          document.getElementById('dialog-pass-btnOk').innerHTML = "Aceptar";
          document.getElementById('dialog-alert-mensaje').innerHTML = "Contraseña incorrecta para <b>"+usr+"</b>.";
          openDialog("dialog-alert");
          document.getElementById('dialog-alert-btnOk').innerHTML = "Aceptar"; 
          document.getElementById('dialog-alert-btnOk').focus();
        }},100);
      }
    }

      //disabled = true/false
     //rojos[i].classList.remove("rojo");
    //rojos[i].classList.add("verde");

    function play(){
      if(document.getElementById("SisOpe").value != -1 && !document.getElementById("ejecutarSO").disabled){
        let qOS = window.electronAPI.getOS()[document.getElementById("SisOpe").value];
        let cmd = "";
        let cdRom = "";
        let dirComp = "";

        for (var i = 0; i < qOS.cmd.length; i++) {

          cmd += qOS.cmd[i] + " ";

          cmd = cmd.replace("<-(ram)->",document.getElementById("nRam").value);
          cmd = cmd.replace("<-(mcore)->",document.getElementById("mCore").value);
          if(document.getElementById("nCore").value != "")
            cmd = cmd.replace("<-(ncore)->",",cores="+document.getElementById("nCore").value);
          else
            cmd = cmd.replace("<-(ncore)->",document.getElementById("nCore").value);
          cmd = cmd.replace("<-(ssd)->",qOS.ssd);
          cmd = cmd.replace("<-(os)->",qOS.os);
          cmd = cmd.replace("<-(socket)->",qOS.socket); 
          cmd = (!qOS.arq)?cmd.replace("<-(arq)->",""):cmd.replace("<-(arq)->",qOS.arq+'/');
        
        }

        if(carpeta_compartida.length > 0){
          window.electronAPI.upVirtiofsd(document.getElementById('txt_pws').value,carpeta_compartida[0]);
          cmd += "-chardev socket,id=char0,path=/tmp/vfs.sock -device vhost-user-fs-pci,chardev=char0,tag="+ carpeta_compartida[1] +" -object memory-backend-memfd,id=mem,size=" + document.getElementById("nRam").value + "G,share=on -numa node,memdev=mem ";
          dirComp = ", Dir "+ carpeta_compartida[0];
        }

        if(document.getElementById('cdrom_so').files.length != 0){
          cdRom = document.getElementById('cdrom_so').files[0].path;
          cmd += "-drive file="+ cdRom +",media=cdrom ";
          cdRom = cdRom.split("/");   
          cdRom = ", CDRom "+ cdRom[cdRom.length-1];   
        }

        if(window.electronAPI.fExists("disks/"+qOS.ssd)){

          if(window.electronAPI.fExists("bios/"+qOS.arq)){
            window.electronAPI.playOS(document.getElementById('txt_pws').value,cmd,qOS.socket);
            document.getElementById("ejecutarSO").disabled = true;
            document.getElementById("ejecutarSO").classList.add("btn-stop");
            document.getElementById("ejecutarSO").title="Sistema Operativo en Ejecuciòn";
            log("Se ejecuto " + document.getElementById("SisOpe").options[document.getElementById("SisOpe").selectedIndex].text + " (Max CPUs "+ document.getElementById("mCore").value + ", Core "+ ((document.getElementById("nCore").value != "")?document.getElementById("nCore").value:document.getElementById("mCore").value) + ", Ram " + document.getElementById("nRam").value + " GB"+cdRom+dirComp+")");  
          }else{
            document.getElementById('dialog-alert-mensaje').innerHTML = "Deben existir las <b> Bios "+ qOS.arq +"</b> para este sistema operativo.";
            openDialog("dialog-alert");
            document.getElementById("SisOpe").value = -1;
          }
        }else{
          document.getElementById('dialog-alert-mensaje').innerHTML = "Debe existir <b>"+ qOS.ssd +"</b> en <b>disks/</b> con el sistema operativo.";
          openDialog("dialog-alert");
          document.getElementById("SisOpe").value = -1;
        }
        
      }else{
        if(document.getElementById("SisOpe").value == -1){
          document.getElementById('dialog-alert-mensaje').innerHTML = "Debes seleccionar un Sistema Operativo.";
          openDialog("dialog-alert");
        }
      }
    }

    function conectUSB(){
      if(document.getElementById("dev_usb").value == -1){
        document.getElementById('dialog-alert-mensaje').innerHTML = "Debes seleccionar un dispositivo <b>USB</b>.";
        openDialog("dialog-alert");
      }else{
        if(document.getElementById("SisOpe").value == -1){
          document.getElementById('dialog-alert-mensaje').innerHTML = "Debes seleccionar un <b>Sistema Operativo</b>.";
          openDialog("dialog-alert");
        }else{
          let socketSO = window.electronAPI.getOS()[document.getElementById("SisOpe").value].socket;
          if(window.electronAPI.validaPlayOS(socketSO)){
            let disp = deviceUSB[document.getElementById("dev_usb").value].bus+':'+deviceUSB[document.getElementById("dev_usb").value].addr+"_"+socketSO;//socketSO.replace(/\//g,"_");
            let xhci = (document.getElementById("dev_xhci").checked)?"on":"off";
            window.electronAPI.processUSB(disp,"add:"+xhci,document.getElementById('txt_pws').value,"respUSB");
          }else{
            document.getElementById('dialog-alert-mensaje').innerHTML = "Debe estar en ejecucion el <b>Sistema Operativo</b>.";
            openDialog("dialog-alert");
          }
        }
      }
    }

    function respUSB(data){
      document.getElementById('dialog-alert-mensaje').innerHTML = "Se " + data.mensaje + " dispositivo <b>"+document.getElementById("dev_usb").options[document.getElementById("dev_usb").selectedIndex].text+"</b>";
      openDialog("dialog-alert");
      log("Se " + data.mensaje + " dispositivo "+document.getElementById("dev_usb").options[document.getElementById("dev_usb").selectedIndex].text);
    }

    function desconectUSB(){
      if(document.getElementById("dev_usb").value == -1){
        document.getElementById('dialog-alert-mensaje').innerHTML = "Debes seleccionar un dispositivo <b>USB</b>.";
        openDialog("dialog-alert");
      }else{
        if(document.getElementById("SisOpe").value == -1){
          document.getElementById('dialog-alert-mensaje').innerHTML = "Debes seleccionar un <b>Sistema Operativo</b>.";
          openDialog("dialog-alert");
        }else{
          let socketSO = window.electronAPI.getOS()[document.getElementById("SisOpe").value].socket;
          if(window.electronAPI.validaPlayOS(socketSO)){
            let disp = deviceUSB[document.getElementById("dev_usb").value].bus+':'+deviceUSB[document.getElementById("dev_usb").value].addr+"_"+socketSO;//socketSO.replace(/\//g,"_");
            window.electronAPI.processUSB(disp,"del:xhci",document.getElementById('txt_pws').value,"respUSB");
          }else{
            document.getElementById('dialog-alert-mensaje').innerHTML = "Debe estar en ejecucion el <b>Sistema Operativo</b>.";
            openDialog("dialog-alert");
          }
        }
      }
    }
    function log(mensaje){
      let fecha = new Date();
      fecha = ((fecha.getDate() < 10)?"0"+fecha.getDate():fecha.getDate()) + "/" + (((fecha.getMonth() + 1) < 10)?"0"+(fecha.getMonth() + 1):(fecha.getMonth() + 1)) + "/" + fecha.getFullYear() + " "+ ((fecha.getHours() < 10)?"0"+fecha.getHours():fecha.getHours()) + ":" +((fecha.getMinutes() < 10)?"0"+fecha.getMinutes():fecha.getMinutes()) + "." + ((fecha.getSeconds() < 10)?"0"+fecha.getSeconds():fecha.getSeconds()) + " - " + mensaje.replace("sudo","id").replace("password","get").replace(/<\/br>/gi,"\n");
      document.getElementById("txt_log").value += fecha + "\n";
    }

      openDialog("dialog-msg");

    function crearDisco(){
      let disco = window.electronAPI.getNameDisk((document.getElementById("txt_nombre").value != "")?document.getElementById("txt_nombre").value : "ssd");
      let tamanio = (document.getElementById("txt_tamanio").value != "")?document.getElementById("txt_tamanio").value + "G": "64G";
      let setqemuimg = window.electronAPI.checkqemuimg();

      if(!setqemuimg){
          log("Se requiere qemu-img.");
          document.getElementById('dialog-alert-mensaje').innerHTML = "Se requiere <b>qemu-img</b>.";
          openDialog("dialog-alert");
          document.getElementById('dialog-alert-btnOk').innerHTML = "Aceptar";
          closeDialog('dialog-cdd');
        }else{  
          closeDialog('dialog-cdd');  
          log("Creando disco " + disco + " con un tamaño total de " + tamanio + " en disks...");
          window.electronAPI.crearDisk(disco, tamanio);
        } 
    }

    function startSFTPM(){
        if(window.electronAPI.checkswtpm()){
          window.electronAPI.createSWTPM(sock_tpm);
          if(window.electronAPI.fExists(sock_tpm)){
            document.getElementById('dialog-alert-mensaje').innerHTML = "Ya se encuentra en ejecución swptm en el socket: <b>"+sock_tpm+"</b>.";
            openDialog("dialog-alert");
          }
        }else{
          log("Se requiere swtpm instalado.");
          document.getElementById('dialog-alert-mensaje').innerHTML = "Se requiere <b>swtpm</b>.";
          openDialog("dialog-alert");
        }
    }

    function installW11(){
      
      let quemuOS = window.electronAPI.getOS();
      let wInstall = {};

      for (var x = 0; x < quemuOS.length; x++) {
            if(quemuOS[x].type == "installW11")
              wInstall = quemuOS[x];
          }
      
      if(!window.electronAPI.fExists("disks/" + document.getElementById("txt_disk_w11").value /*+ ".qcow2"*/)){
        //log("Se requiere el nombre del disco virtual en disks/ para la instalación.");
        document.getElementById('dialog-alert-mensaje').innerHTML = "Se requiere el nombre del <b>disco virtual</b> en <b>disks/</b> para <b>"+ wInstall.os +"</b>.";
        openDialog("dialog-alert");
      }else{
        if(!window.electronAPI.fExists(document.getElementById("txt_iso_w11").value)){
          //log("Se requiere la iso de Window 11.");
          document.getElementById('dialog-alert-mensaje').innerHTML = "Se requiere la iso de <b>"+ wInstall.os +"</b>.";
          openDialog("dialog-alert");
        }else{          
          
          let tpm = (window.electronAPI.isSWTPM(sock_tpm))?sock_tpm:"";
          let cmd = "";
          let swtpm = "-chardev socket,id=chrtpm,path=" + tpm + " -tpmdev emulator,id=tpm0,chardev=chrtpm -device tpm-tis,tpmdev=tpm0";
          let driverVirtio = "";

          closeDialog('dialog-installW11');

          if(tpm == "")
             swtpm = "";

          if(!window.electronAPI.fExists("bios/"+wInstall.arq)){
              document.getElementById('dialog-alert-mensaje').innerHTML = "Deben existir las <b> Bios "+ wInstall.arq +"</b> para <b>"+ wInstall.os +"</b>.";
              openDialog("dialog-alert"); 
          }else{
            for (var i = 0; i < wInstall.cmd.length; i++) {

              cmd += wInstall.cmd[i] + " ";

              cmd = cmd.replace("<-(ram)->",wInstall.ram);
              cmd = cmd.replace("<-(mcore)->",wInstall.mcore);
              if(wInstall.ncore != "")
                cmd = cmd.replace("<-(ncore)->",",cores="+wInstall.ncore);
              else
                cmd = cmd.replace("<-(ncore)->",wInstall.ncore);
              cmd = cmd.replace("<-(os)->",wInstall.os);
              cmd = cmd.replace("<-(socket)->",wInstall.socket);
              cmd = (!wInstall.arq)?cmd.replace("<-(arq)->",""):cmd.replace("<-(arq)->",wInstall.arq+'/');

              cmd = cmd.replace("<-(ssd)->",document.getElementById("txt_disk_w11").value /*+ ".qcow2"*/);
              cmd = cmd.replace("<-(isowin)->",document.getElementById("txt_iso_w11").value); 

              if(wInstall.cmd[i].indexOf(fVirtIO) !== -1)
                  driverVirtio = fVirtIO;
            
            }
            cmd += swtpm;

            if(driverVirtio != ""){
              if(window.electronAPI.fExists(driverVirtio)){
                exeWinInstall(wInstall,cmd);
              }else{
                let tFVIOFaltan = "";
                for (var i = 1; i < 7; i++) {
                  if(!window.electronAPI.fExists(driverVirtio+"_"+i)){
                      tFVIOFaltan += driverVirtio +"_" + i + ",";
                  }
                  if(i == 6){
                    if(tFVIOFaltan != ""){
                      log("Se requieren los binarios: " + tFVIOFaltan + " descargar de GitHub...");
                      document.getElementById('dialog-alert-mensaje').innerHTML = "Se requieren los binarios: <b>" + tFVIOFaltan + "</b> descargar de <b>GitHub</b>...";
                      openDialog("dialog-alert");
                    }else{
                      //log("Se requieren los driver virtio-win, reinicie la aplicación para generar.");
                      document.getElementById('dialog-alert-mensaje').innerHTML = "Se requieren los drivers <b>virtio-win</b>, reinicie la aplicación para generar.";
                      openDialog("dialog-alert");
                    }
                  }
                }
              }
            }else{
              exeWinInstall(wInstall,cmd);
            }  
          }
        }
      }
    }

    function exeWinInstall(wInstall,cmd){
        window.electronAPI.playOS(document.getElementById('txt_pws').value,cmd,wInstall.socket);
        log("Se ejecuto " + wInstall.os + " (Max CPUs "+ wInstall.mcore + ", Core "+ ((wInstall.ncore != "")?wInstall.ncore:wInstall.mcore) + ", Ram " + wInstall.ram + " GB)");
        document.getElementById("btn_installW11").disabled = true;
        document.getElementById("btn_installW11").classList.remove("btn-iW11");
        document.getElementById("btn_installW11").classList.add("btn-stop");
        sock_w11Install = wInstall.socket;
    }

    function updateBtniW11(tipo){
      if(tipo == "on"){
          if(sock_w11Install != ""){
            if(window.electronAPI.validaPlayOS(sock_w11Install)){
              document.getElementById("btn_installW11").disabled = true;
              document.getElementById("btn_installW11").classList.remove("btn-iW11");
              document.getElementById("btn_installW11").classList.add("btn-stop");
            }else{
              document.getElementById("btn_installW11").disabled = false;
              document.getElementById("btn_installW11").classList.add("btn-iW11");
              document.getElementById("btn_installW11").classList.remove("btn-stop");
              sock_w11Install = "";
            }
        }
      }else{
        let quemuOS = window.electronAPI.getOS();
        for (var x = 0; x < quemuOS.length; x++) {
            if(quemuOS[x].type == "installW11")
                sock_w11Install = quemuOS[x].socket;
          }
         updateBtniW11("on");
      }
      
    }

    function loadDisks(){
      let disks = window.electronAPI.getDisks();
      document.getElementById("opt_disk_w11").innerHTML = "<option value='-1'>Seleccione disco</option>";
      for (var d = 0; d < disks.length; d++) {
            document.getElementById("opt_disk_w11").innerHTML += "<option value='"+disks[d]+"'>"+disks[d]+"</option>";
      }
      document.getElementById('txt_disk_w11').value='-1';
      document.getElementById('txt_iso_w11').value=(document.getElementById('file_iso_w11').files.length != 0)?document.getElementById('file_iso_w11').files[0].path:"";
      openDialog('dialog-installW11');
    }

    function limpiarCDRom(){
      document.getElementById('cdrom_so').value = "";
      document.getElementById('img_iso_cdrom').innerHTML = "Sin CD-Rom";
    }

    function loadCapCop(elem){
      let dirAry = elem.files[0].path.split('/');
      let dir = (dirAry.pop(),dirAry.join('/'));
      
      carpeta_compartida[0] = dir;
      carpeta_compartida[1] = dirAry.pop();
      document.getElementById('dir_comp_so').innerHTML= dir; 
    }

    function limpiarCarpComp(){
      document.getElementById('dir_so').value = "";
      document.getElementById('dir_comp_so').innerHTML = "Sin Carpeta Compartida";
      carpeta_compartida = [];
    }
 
	</script>
